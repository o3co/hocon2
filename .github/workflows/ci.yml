name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  ci:
    strategy:
      matrix:
        go-version: ['1.25']
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/...

  test:
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.ci.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
